name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build binary
        run: |
          python build_binary.py

      - name: Verify binary
        run: |
          dist/crb --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: crb-${{ runner.os }}
          path: dist/crb*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for dir in crb-*/; do
            arch="${dir%/}"
            gh release upload "${GITHUB_REF_NAME}" "$dir/crb"#"$arch"
          done
